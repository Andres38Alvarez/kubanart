<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>{{ artista.nombre }} — Kubanart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:750px;">
  <a href="{% url 'zettels:artista_list' %}" class="text-muted small">← Volver a artistas</a>
  <div class="card shadow-sm mt-3">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">{{ artista.nombre }}</h4>
    </div>
    <div class="card-body">
      <table class="table table-striped mb-0">
        <tbody>
          <tr><th>País</th><td>{{ artista.pais }}</td></tr>
          <tr><th>Fecha de nacimiento</th><td>{{ artista.fecha_nacimiento }}</td></tr>
        </tbody>
      </table>
      <h5 class="mt-4">Obras</h5>
      <ul class="list-group">
        {% for obra in artista.obras.all %}
        <li class="list-group-item">
          <a href="{% url 'zettels:obra_detail' obra.pk %}">{{ obra.titulo }}</a>
          <span class="text-muted small ms-2">{{ obra.fecha_realizacion }}</span>
        </li>
        {% empty %}
        <li class="list-group-item">Sin obras registradas.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
</body>
</html>
