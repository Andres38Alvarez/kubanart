<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Artistas — Kubanart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Artistas</h1>
  <div class="card shadow-sm">
    <ul class="list-group list-group-flush">
      {% for artist in artists %}
      <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <a href="{% url 'zettels:artist_detail' artist.pk %}" class="text-decoration-none text-dark fw-semibold">
          {{ artist.name }}
        </a>
        <span class="badge bg-secondary">{{ artista.country }}</span>
      </li>
      {% empty %}
      <li class="list-group-item">Not artists registered.</li>
      {% endfor %}
    </ul>
  </div>
  <a href="{% url 'zettels:artwork_list' %}" class="btn btn-outline-secondary mt-3">Ver Obras</a>
</div>
</body>
</html>
