<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Artworks — Kubanart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Artworks</h1>
  <div class="card shadow-sm">
    <ul class="list-group list-group-flush">
      {% for artwork in artworks %}
      <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <a href="{% url 'zettels:artwork_detail' artwork.pk %}" class="text-decoration-none text-dark fw-semibold">
          {{ artwork.title }}
        </a>
        <span class="text-muted small">{{ artwork.artist.name }}</span>
      </li>
      {% empty %}
      <li class="list-group-item">No art works registered.</li>
      {% endfor %}
    </ul>
  </div>
  <a href="{% url 'zettels:artist_list' %}" class="btn btn-outline-secondary mt-3">View Artists</a>
</div>
</body>
</html>
