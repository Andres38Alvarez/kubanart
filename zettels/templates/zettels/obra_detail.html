<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>{{ artwork.title }} — Kubanart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:750px;">
  <a href="{% url 'zettels:artwork_list' %}" class="text-muted small">← Back to Artworks</a>
  <div class="card shadow-sm mt-3">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">{{ artwork.title }}</h4>
    </div>
    <div class="card-body">
      <table class="table table-striped mb-0">
        <tbody>
          <tr><th>Artist</th><td><a href="{% url 'zettels:artist_detail' artwork.artist.pk %}">{{ artwork.artist.name }}</a></td></tr>
          <tr><th>Creation Date</th><td>{{ artwork.creation_date }}</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
